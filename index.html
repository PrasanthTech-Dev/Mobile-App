<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#1a1f2e',
            'card-bg': '#ffffff',
            'brand-blue': '#4f6ef7',
            'input-border': '#e8eaf0',
            'text-dark': '#1a1f2e',
            'text-muted': '#9ca3af',
            'text-link': '#4f6ef7',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0f1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }

    .phone-frame {
      width: 375px;
      min-height: 812px;
      background: #1a1f2e;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    /* Stars background */
    .stars {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Logo shield */
    .logo-shield {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #4f6ef7, #3b5ce4);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(79,110,247,0.4);
    }

    /* Input field */
    .input-field {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: #1a1f2e;
      font-family: 'Inter', sans-serif;
      padding: 0;
    }
    .input-field::placeholder { color: #9ca3af; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f1f5;
    }
    .input-row:last-child { border-bottom: none; }

    .input-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
      color: #9ca3af;
    }

    /* Button */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #5b7af8, #4f6ef7);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(79,110,247,0.4);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,110,247,0.5); }
    .btn-primary:active { transform: translateY(0); }

    /* Phone input customization */
    .phone-wrapper { display: flex; align-items: center; gap: 8px; flex: 1; }
    .flag-select {
      display: flex; align-items: center; gap: 4px;
      cursor: pointer;
      padding-right: 8px;
      border-right: 1px solid #e8eaf0;
    }
    .flag-emoji { font-size: 16px; }
    .chevron-icon { width: 10px; height: 10px; color: #9ca3af; }

    /* Error message */
    .error-msg { color: #ef4444; font-size: 11px; margin-top: 4px; padding: 0 4px; }

    /* Screen transition */
    .screen { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    /* Bottom indicator */
    .home-indicator {
      width: 120px; height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      margin: 12px auto 8px;
    }

    /* Status bar */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 28px 0;
      font-size: 12px; font-weight: 600; color: white;
    }

    .iti { width: 100%; }
    .iti__flag-container { position: static; }

    /* Scrollable content */
    .screen-content {
      padding: 20px 28px 0;
      flex: 1;
    }

    /* Date input */
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// Stars background
const Stars = () => {
  const stars = Array.from({ length: 40 }, (_, i) => ({
    id: i,
    top: Math.random() * 100,
    left: Math.random() * 100,
    size: Math.random() * 2 + 1,
    delay: Math.random() * 3,
  }));
  return (
    <div className="stars">
      {stars.map(s => (
        <div key={s.id} className="star" style={{
          top: `${s.top}%`, left: `${s.left}%`,
          width: s.size, height: s.size,
          animationDelay: `${s.delay}s`,
        }} />
      ))}
    </div>
  );
};

// Shield Logo
const ShieldLogo = () => (
  <div className="logo-shield">
    <svg width="26" height="28" viewBox="0 0 26 28" fill="none">
      <path d="M13 1L2 5.5V13C2 19.08 6.84 24.74 13 26.5C19.16 24.74 24 19.08 24 13V5.5L13 1Z" fill="white" fillOpacity="0.9"/>
      <path d="M8 14l3.5 3.5L18 10" stroke="#4f6ef7" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  </div>
);

// Eye icon
const EyeIcon = ({ show, onToggle }) => (
  <button type="button" onClick={onToggle} style={{background:'none',border:'none',cursor:'pointer',padding:0,display:'flex',alignItems:'center'}}>
    {show ? (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    ) : (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    )}
  </button>
);

// Icon components
const MailIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
    <polyline points="22,6 12,13 2,6"/>
  </svg>
);
const LockIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0110 0v4"/>
  </svg>
);
const UserIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
    <circle cx="12" cy="7" r="4"/>
  </svg>
);
const CalendarIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
    <line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
);
const PhoneIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.22 2.18 2 2 0 012.18 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.91-.91a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.41v2.51z"/>
  </svg>
);

const BackIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
);

// ─── LOGIN SCREEN ───────────────────────────────────────────────────
const LoginScreen = ({ onNavigate }) => {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [errors, setErrors] = useState({});

  const validate = () => {
    const errs = {};
    if (!email) errs.email = 'Email is required';
    else if (!/\S+@\S+\.\S+/.test(email)) errs.email = 'Enter a valid email address';
    if (!password) errs.password = 'Password is required';
    else if (password.length < 6) errs.password = 'Password must be at least 6 characters';
    return errs;
  };

  const handleLogin = () => {
    const errs = validate();
    setErrors(errs);
    if (Object.keys(errs).length === 0) {
      alert('Login successful!');
    }
  };

  return (
    <div className="screen" style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div className="screen-content" style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:60}}>
        <ShieldLogo />
        <h1 style={{color:'white',fontSize:26,fontWeight:800,textAlign:'center',margin:'0 0 8px',lineHeight:1.2}}>
          Sign in to your<br/>Account
        </h1>
        <p style={{color:'rgba(255,255,255,0.55)',fontSize:13,margin:'0 0 32px',textAlign:'center'}}>
          Don't have an account?{' '}
          <span onClick={() => onNavigate('register')} style={{color:'#4f6ef7',fontWeight:600,cursor:'pointer'}}>Sign Up</span>
        </p>

        {/* Form Card */}
        <div style={{background:'white',borderRadius:20,width:'100%',marginBottom:8,overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}}>
          <div className="input-row">
            <MailIcon />
            <input
              className="input-field"
              type="email"
              placeholder="Email"
              value={email}
              onChange={e => { setEmail(e.target.value); setErrors(p=>({...p,email:''})); }}
            />
          </div>
          <div className="input-row" style={{borderBottom:'none'}}>
            <LockIcon />
            <input
              className="input-field"
              type={showPw ? 'text' : 'password'}
              placeholder="Password"
              value={password}
              onChange={e => { setPassword(e.target.value); setErrors(p=>({...p,password:''})); }}
            />
            <EyeIcon show={showPw} onToggle={() => setShowPw(p=>!p)} />
          </div>
        </div>

        {/* Inline errors */}
        {errors.email && <div className="error-msg" style={{alignSelf:'flex-start'}}>{errors.email}</div>}
        {errors.password && <div className="error-msg" style={{alignSelf:'flex-start'}}>{errors.password}</div>}

        <div style={{width:'100%',textAlign:'center',margin:'12px 0 24px'}}>
          <span style={{color:'rgba(255,255,255,0.7)',fontSize:13,cursor:'pointer',borderBottom:'1px dashed rgba(255,255,255,0.3)',paddingBottom:1}}>
            Forgot Your Password ?
          </span>
        </div>

        <button className="btn-primary" onClick={handleLogin}>Log In</button>
      </div>
    </div>
  );
};

// ─── REGISTER SCREEN ────────────────────────────────────────────────
const RegisterScreen = ({ onNavigate }) => {
  const [form, setForm] = useState({ name:'', email:'', dob:'', phone:'', password:'', countryCode:'+91' });
  const [showPw, setShowPw] = useState(false);
  const [errors, setErrors] = useState({});
  const [showDrop, setShowDrop] = useState(false);

  const countries = [
    { code: '+1', flag: '🇺🇸', name: 'United States' },
    { code: '+44', flag: '🇬🇧', name: 'United Kingdom' },
    { code: '+91', flag: '🇮🇳', name: 'India' },
    { code: '+61', flag: '🇦🇺', name: 'Australia' },
    { code: '+49', flag: '🇩🇪', name: 'Germany' },
    { code: '+33', flag: '🇫🇷', name: 'France' },
    { code: '+81', flag: '🇯🇵', name: 'Japan' },
    { code: '+86', flag: '🇨🇳', name: 'China' },
    { code: '+55', flag: '🇧🇷', name: 'Brazil' },
    { code: '+52', flag: '🇲🇽', name: 'Mexico' },
  ];

  const selectedCountry = countries.find(c => c.code === form.countryCode) || countries[0];

  const setField = (field, val) => {
    setForm(p => ({ ...p, [field]: val }));
    setErrors(p => ({ ...p, [field]: '' }));
  };

  const validate = () => {
    const errs = {};
    if (!form.name.trim()) errs.name = 'Full name is required';
    if (!form.email) errs.email = 'Email is required';
    else if (!/\S+@\S+\.\S+/.test(form.email)) errs.email = 'Enter a valid email';
    if (!form.dob) errs.dob = 'Date of birth is required';
    if (!form.phone) errs.phone = 'Phone number is required';
    else if (!/^\d{7,15}$/.test(form.phone.replace(/\s/g,''))) errs.phone = 'Enter a valid phone number';
    if (!form.password) errs.password = 'Password is required';
    else if (form.password.length < 6) errs.password = 'Minimum 6 characters';
    return errs;
  };

  const handleRegister = () => {
    const errs = validate();
    setErrors(errs);
    if (Object.keys(errs).length === 0) {
      alert('Registration successful!');
    }
  };

  return (
    <div className="screen" style={{display:'flex',flexDirection:'column',height:'100%'}}>
      {/* Back button */}
      <div style={{padding:'12px 20px 0'}}>
        <button onClick={() => onNavigate('login')} style={{background:'none',border:'none',cursor:'pointer',padding:'6px',display:'flex',alignItems:'center'}}>
          <BackIcon />
        </button>
      </div>

      <div className="screen-content" style={{paddingTop:16,display:'flex',flexDirection:'column',alignItems:'center'}}>
        <ShieldLogo />
        <h1 style={{color:'white',fontSize:26,fontWeight:800,textAlign:'center',margin:'0 0 8px'}}>
          Create account
        </h1>
        <p style={{color:'rgba(255,255,255,0.55)',fontSize:13,margin:'0 0 24px',textAlign:'center'}}>
          Already have an account?{' '}
          <span onClick={() => onNavigate('login')} style={{color:'#4f6ef7',fontWeight:600,cursor:'pointer'}}>Login</span>
        </p>

        {/* Form Card */}
        <div style={{background:'white',borderRadius:20,width:'100%',overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}}>
          {/* Name */}
          <div className="input-row">
            <UserIcon />
            <input className="input-field" type="text" placeholder="Full Name" value={form.name} onChange={e=>setField('name',e.target.value)} />
          </div>
          {/* Email */}
          <div className="input-row">
            <MailIcon />
            <input className="input-field" type="email" placeholder="Email" value={form.email} onChange={e=>setField('email',e.target.value)} />
          </div>
          {/* DOB */}
          <div className="input-row">
            <CalendarIcon />
            <input className="input-field" type="date" value={form.dob} onChange={e=>setField('dob',e.target.value)}
              style={{flex:1,colorScheme:'light'}}
            />
          </div>
          {/* Phone */}
          <div className="input-row" style={{position:'relative'}}>
            {/* Flag/code selector */}
            <div onClick={()=>setShowDrop(p=>!p)} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',paddingRight:8,borderRight:'1px solid #e8eaf0',marginRight:4,flexShrink:0}}>
              <span style={{fontSize:16}}>{selectedCountry.flag}</span>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
            <span style={{color:'#1a1f2e',fontSize:14,fontWeight:500,marginRight:4,flexShrink:0}}>{form.countryCode}</span>
            <input className="input-field" type="tel" placeholder="Phone number" value={form.phone} onChange={e=>setField('phone',e.target.value)} />

            {/* Dropdown */}
            {showDrop && (
              <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',borderRadius:12,boxShadow:'0 8px 32px rgba(0,0,0,0.15)',zIndex:100,maxHeight:200,overflowY:'auto',border:'1px solid #f0f1f5'}}>
                {countries.map(c => (
                  <div key={c.code} onClick={()=>{setField('countryCode',c.code);setShowDrop(false);}}
                    style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',fontSize:13,color:'#1a1f2e'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#f7f8ff'}
                    onMouseLeave={e=>e.currentTarget.style.background='white'}>
                    <span style={{fontSize:18}}>{c.flag}</span>
                    <span style={{flex:1}}>{c.name}</span>
                    <span style={{color:'#9ca3af'}}>{c.code}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          {/* Password */}
          <div className="input-row" style={{borderBottom:'none'}}>
            <LockIcon />
            <input className="input-field" type={showPw?'text':'password'} placeholder="Password" value={form.password} onChange={e=>setField('password',e.target.value)} />
            <EyeIcon show={showPw} onToggle={()=>setShowPw(p=>!p)} />
          </div>
        </div>

        {/* Errors */}
        <div style={{width:'100%',marginTop:6}}>
          {Object.values(errors).filter(Boolean).map((e,i)=>(
            <div key={i} className="error-msg">{e}</div>
          ))}
        </div>

        <div style={{marginTop:24,width:'100%',paddingBottom:20}}>
          <button className="btn-primary" onClick={handleRegister}>Register</button>
        </div>
      </div>
    </div>
  );
};

// ─── APP ────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState('login');

  return (
    <div className="phone-frame">
      <Stars />

      {/* Status bar */}
      <div className="status-bar">
        <span>9:41</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="white"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
          <svg width="15" height="11" viewBox="0 0 20 14" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 1a18 18 0 0118 0"/><path d="M4 5a13 13 0 0112 0"/><path d="M7 9a8 8 0 016 0"/><circle cx="10" cy="13" r="1" fill="white" stroke="none"/></svg>
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="0.5" width="20" height="11" rx="3.5" stroke="white" strokeOpacity="0.5"/><rect x="2" y="2" width="15" height="8" rx="2" fill="white"/><path d="M22 4.5v3a2 2 0 000-3z" fill="white" fillOpacity="0.4"/></svg>
        </div>
      </div>

      {/* Screen content */}
      <div style={{position:'relative',zIndex:1,height:'calc(100% - 50px)',overflowY:'auto',overflowX:'hidden'}}>
        {screen === 'login'
          ? <LoginScreen onNavigate={setScreen} />
          : <RegisterScreen onNavigate={setScreen} />
        }
      </div>

      {/* Home indicator */}
      <div style={{position:'absolute',bottom:0,width:'100%',background:'transparent',paddingBottom:6,zIndex:10}}>
        <div className="home-indicator" />
      </div>
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
